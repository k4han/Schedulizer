schedules:
  # One-time task
  first_time_event:
    enabled: true
    type: "once"
    time: "08/02/2025 15:30" # dd/MM/yyyy HH:mm
    command:
    - "say One time event!"

  # Daily task
  daily_reset:
    enabled: true
    type: "daily"
    time: "12:00" # HH:mm
    command:
    - "say New daily!"

  # Repeating task
  repeating_event:
    enabled: true
    type: "repeat"
    interval: 5  # minute
    command:
    - "say Repeating!"

  # Cron task
  cron_event:
    enabled: true
    type: "cron"
    cron: "0 0 * * *"  # Every day at 00:00
    command:
    - "say Cron event!"
