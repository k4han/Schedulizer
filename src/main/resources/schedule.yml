
# supported types: once, daily, repeat, cron
schedules:
  # One time event
  first_time_event:
    enabled: true
    type: "once"
    time: "2025-02-08 15:30:00" # YYYY-MM-DD HH:MM:SS
    command:
    - "say one time event!"
    - "say Welcome first time!"

  # Daily time event
  daily_reset:
    enabled: true
    type: "daily"
    time: "12:00:00" # HH:MM:SS
    command:
    - "say new Daily!"

  # Repeating event
  repeating_event:
    enabled: true
    type: "repeat"
    interval: 5  # minute
    start_minutes: 0  # minutes from midnight (0 = 00:00, 60 = 01:00, etc.)
    command:
    - "say Repeating!"

      # https://crontab.guru/ - Use this link to generate cron expressions easily
  # Cron-based event (UNIX cron format: minute hour day month weekday)
  cron_event:
    enabled: true
    type: "cron"
    cron: "0 0 * * *"  # Every day at midnight
    command:
    - "say Cron event triggered!"

  # Another cron example: every 15 minutes
  cron_15min:
    enabled: false
    type: "cron"
    cron: "*/15 * * * *"  # Every 15 minutes
    command:
    - "say 15 minutes passed!"
