
# supported types: once, daily, repeat
schedules:
  # One time event
  first_time_event:
    enabled: true
    type: "once"
    time: "2025-02-08 15:30:00"
    command:
    - "say one time event!"
    - "say Welcome first time!"

  # Daily time event
  daily_reset:
    enabled: true
    type: "daily"
    time: "12:00:00"
    command:
    - "say new Daily!"

  # Repeating event
  repeating_event:
    enabled: true
    type: "repeat"
    interval: 5  # minute
    command:
    - "say Repeating!"
  
  # Example with conditions - only runs during day with at least 2 players
  daytime_event:
    enabled: true
    type: "repeat"
    interval: 10  # minute
    conditions:
      min-players: 2
      time-of-day: "day"
    command:
    - "say Daytime event with players online!"
  
  # Example with max players condition - only runs at night with less than 5 players
  nighttime_event:
    enabled: true
    type: "daily"
    time: "20:00:00"
    conditions:
      max-players: 5
      time-of-day: "night"
    command:
    - "say Nighttime event with few players!"
